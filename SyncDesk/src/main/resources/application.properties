spring.application.name=SyncDesk

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/syncdesk
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT - replace secret in production
api.security.token.secret=syncdesk-jwt-secret-key-2024-must-be-long-enough-for-hs256
api.security.token.expiration=86400000
