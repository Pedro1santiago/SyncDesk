services:
  postgres:
    image: postgres:16-alpine
    container_name: syncdesk-postgres
    environment:
      POSTGRES_DB: syncdesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - syncdesk_pgdata:/var/lib/postgresql/data

volumes:
  syncdesk_pgdata:
